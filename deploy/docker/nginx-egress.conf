worker_processes 1;

events {
    worker_connections 128;
}

http {
    # Egress proxy for agent runtime
    # Only allows traffic to approved destinations

    log_format egress '$remote_addr - $request - $upstream_addr - $status';
    access_log /tmp/egress-access.log egress;
    error_log /tmp/egress-error.log warn;

    # Allowlisted upstream: guardrail service
    upstream guardrail {
        server guardrail-service:3000;
    }

    server {
        listen 8080;

        # Guardrail service — allowed
        location /guardrail/ {
            proxy_pass http://guardrail/;
        }

        # Block everything else
        location / {
            return 403 "Egress blocked: destination not in allowlist.\n";
        }
    }

    # DNS and egress logging is handled by nginx access logs above.
    # CEX APIs, RPC endpoints, metadata services, and RFC1918/internal
    # ranges are blocked because the agent-net is internal-only and
    # the only exit is through this proxy.
}
